<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guide</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: white;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .back {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid #333;
      background: #171717;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .topbar-title {
      font-size: 0.95rem;
      color: #aaa;
    }

    .hero-card {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 18px;
      padding-bottom: 4px;
    }

  .hero-card img {
  width: 100%;
  aspect-ratio: 16 / 10;
  object-fit: cover;
  object-position: center;
  display: block;
  background: #eee;
}

.hero-card img.plateosaurus-image {
  object-position: center top;
}

.hero-content {
  padding: 16px;
  box-sizing: border-box;
}

.title {
  font-size: 2.1rem;
  font-weight: 700;
  line-height: 1.08;
  margin: 0 0 12px 0;
  text-align: left;
}

.description {
  color: #b6b6b6;
  line-height: 1.5;
  margin: 0;
  font-size: 0.97rem;
  text-align: left;
}

    .controls {
      margin-top: 18px;
    }

    .start-btn {
      width: 100%;
      padding: 18px 20px;
      border: none;
      border-radius: 999px;
      background: #c89a4b;
      color: black;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(200,154,75,0.16);
    }
    
    .stop-btn {
  width: 100%;
  padding: 16px 20px;
  border: 1px solid #3a3a3a;
  border-radius: 999px;
  background: #1f1f1f;
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}

.stop-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

    .status-card {
      margin-top: 16px;
      border-radius: 18px;
      border: 1px solid #2f2f2f;
      background: #171717;
      padding: 16px;
      min-height: 70px;
    }

    .status-label {
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    #status {
      color: #ddd;
      line-height: 1.45;
      font-size: 0.98rem;
      word-break: break-word;
    }

    audio {
      width: 100%;
      margin-top: 14px;
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <button class="back" onclick="window.location.href='index.html'">←</button>
      <div class="topbar-title">Audio Guide</div>
    </div>

    <div class="hero-card">
      <img id="heroImage" src="" alt="">
     <div class="hero-content">
  <h1 class="title" id="title">Guide</h1>
  <div class="description" id="description">
  </div>
    </div>

<div class="controls">
  <button class="start-btn" id="start">🎤 Start guide</button>
  <button class="stop-btn" id="stop">⏸ Stop</button>
</div>

    <div class="status-card">
      <div class="status-label">Status</div>
      <div id="status">Ready.</div>
    </div>
  </div>

  <script>
  
  let lastUserTranscript = "";
let lastAssistantTranscript = "";
let dc;
let mediaStream;
    const params = new URLSearchParams(window.location.search);

    const exhibit = params.get("exhibit") || "plateosaurus";
    const mode = params.get("mode") || "adult";
    const lang = params.get("lang") || "de";

const exhibitConfig = {
  plateosaurus: {
    title: "Plateosaurus",
    image: "plateosaurus.png",
    imageClass: "plateosaurus-image",
  },
  ichthyosaurus: {
    title: "Ichthyosaurus",
    image: "ichthyosaurus.png",
    imageClass: "",
  },
  aldabra: {
    title: "Aldabra-Riesenschildkröte",
    image: "aldabra.png",
    imageClass: "",
  },
    allosaurus: {
    title: "Allosaurus",
    image: "allosaurus.png",
    imageClass: "",
  }
};
    const config = exhibitConfig[exhibit] || exhibitConfig.plateosaurus;

    document.getElementById("title").textContent = config.title;
    document.getElementById("heroImage").src = config.image;
    document.getElementById("heroImage").className = config.imageClass || "";
    document.getElementById("heroImage").alt = config.title;
    
function getIntroText(lang) {
  if (lang === "de") {
    return "Hallo, ich bin dein Audioguide. Du kannst mir alles zu diesem Objekt fragen. Wenn du eine Pause machen willst, drücke einfach auf Stopp und starte mich danach wieder.";
  } else {
    return "Hello, I’m your audio guide. You can ask me anything about this object. If you want to take a break, press stop and start me again afterwards.";
  }
}

document.getElementById("description").textContent = getIntroText(lang);

const startButton = document.getElementById("start");
const stopButton = document.getElementById("stop");
const statusText = document.getElementById("status");

if (lang === "de") {
  startButton.textContent = "🎤 Start";
  stopButton.textContent = "⏸ Stopp";
  statusText.textContent = "Bereit.";
  document.querySelector(".status-label").textContent = "Status";
  document.querySelector(".topbar-title").textContent = "Audio Guide";
} else {
  startButton.textContent = "🎤 Start";
  stopButton.textContent = "⏸ Stop";
  statusText.textContent = "Ready.";
  document.querySelector(".status-label").textContent = "Status";
  document.querySelector(".topbar-title").textContent = "Audio Guide";
}

stopButton.disabled = true;

    let pc;
    let audioElement;

function stopGuide() {
  if (pc) {
    pc.close();
    pc = null;
  }

  if (audioElement) {
    audioElement.pause();
    audioElement.srcObject = null;
    audioElement.remove();
    audioElement = null;
  }
  
  if (mediaStream) {
  mediaStream.getTracks().forEach(track => track.stop());
  mediaStream = null;
}

  document.querySelectorAll(".status-card audio").forEach(el => el.remove());

  startButton.disabled = false;
  startButton.style.opacity = "1";
  stopButton.disabled = true;

  statusText.textContent = lang === "de"
    ? "Gestoppt. Du kannst den Guide wieder starten."
    : "Stopped. You can start the guide again.";
}
stopButton.addEventListener("click", () => {
  stopGuide();
});

    startButton.addEventListener("click", async () => {
      try {
      lastUserTranscript = "";
lastAssistantTranscript = "";
      startButton.disabled = true;
startButton.style.opacity = "0.7";
stopButton.disabled = false;
        if (pc || audioElement) {
  stopGuide();
  stopButton.disabled = false;
  startButton.disabled = true;
  startButton.style.opacity = "0.7";
}
        statusText.textContent = lang === "de"
          ? "Session wird erstellt..."
          : "Creating session...";

        const tokenResponse = await fetch(
  `https://audio-guide-api-dds9.onrender.com/session?exhibit=${exhibit}&mode=${mode}&lang=${lang}`
);

        const data = await tokenResponse.json();
        console.log("SESSION DATA:", data);

        if (!data.client_secret) {
  statusText.textContent =
    "Server response: " + JSON.stringify(data);
  startButton.disabled = false;
  startButton.style.opacity = "1";
  stopButton.disabled = true;
  return;
}

        const EPHEMERAL_KEY = data.client_secret.value;

        statusText.textContent = lang === "de"
          ? "Mikrofon wird aktiviert..."
          : "Activating microphone...";

        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        pc = new RTCPeerConnection();
        dc = pc.createDataChannel("oai-events");

dc.onmessage = (event) => {
  const msg = JSON.parse(event.data);
  console.log("Realtime event:", msg);

  // Nutzerfrage als Transkript
  if (msg.type === "conversation.item.input_audio_transcription.completed") {
    lastUserTranscript = msg.transcript || "";
  }

  // KI-Antwort als Transkript
if (msg.type === "response.audio_transcript.done") {
  lastAssistantTranscript = msg.transcript || "";

  const logData = {
    timestamp: new Date().toISOString(),
    exhibit,
    mode,
    lang,
    userTranscript: lastUserTranscript,
    assistantTranscript: lastAssistantTranscript
  };

  fetch("https://audio-guide-api-dds9.onrender.com/log", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(logData)
  }).catch(err => console.error("Log failed:", err));
}
};

        audioElement = document.createElement("audio");
        audioElement.autoplay = true;
        document.querySelector(".status-card").appendChild(audioElement);

        pc.ontrack = (event) => {
  audioElement.srcObject = event.streams[0];

  startButton.disabled = true;
  startButton.style.opacity = "0.7";
  statusText.textContent = lang === "de"
  ? "Antwort läuft..."
  : "Speaking...";


audioElement.onended = () => {
  statusText.textContent = lang === "de"
    ? "Bereit. Du kannst weiterfragen oder stoppen."
    : "Ready. You can keep asking or stop.";
};
};

        mediaStream.getTracks().forEach(track => {
  pc.addTrack(track, mediaStream);
});

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        statusText.textContent = lang === "de"
          ? "Verbindung wird aufgebaut..."
          : "Connecting...";

        const baseUrl = "https://api.openai.com/v1/realtime";
        const model = "gpt-realtime";

        const sdpResponse = await fetch(`${baseUrl}?model=${model}`, {
          method: "POST",
          body: offer.sdp,
          headers: {
            Authorization: `Bearer ${EPHEMERAL_KEY}`,
            "Content-Type": "application/sdp"
          },
        });

        const answer = {
          type: "answer",
          sdp: await sdpResponse.text(),
        };

       await pc.setRemoteDescription(answer);

statusText.textContent = lang === "de"
  ? "Verbunden."
  : "Connected.";
  
      } catch (error) {
  console.error(error);
  stopGuide();
  statusText.textContent = "Error: " + error.message;
}
    });
  </script>
</body>
</html>
